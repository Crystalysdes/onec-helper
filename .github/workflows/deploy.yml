name: Deploy to Timeweb VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /app
            git pull origin main
            # Update nginx to proxy everything to Docker
            NGINX_CONF=$(find /etc/nginx/sites-enabled /etc/nginx/conf.d -maxdepth 1 -type f 2>/dev/null | head -1)
            if [ -n "$NGINX_CONF" ]; then
              cp /app/nginx/nginx-timeweb.conf "$NGINX_CONF"
              nginx -t && nginx -s reload || true
            fi
            docker compose -f docker-compose.timeweb.yml up -d --build
            docker image prune -f
