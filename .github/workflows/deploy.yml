name: Deploy to Timeweb VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script: |
            cd /app
            git pull origin main
            cd /app/miniapp && npm install --silent && VITE_API_URL="https://net1c.ru/api/v1" npm run build
            cd /app
            docker compose -f docker-compose.timeweb.yml down
            DOCKER_BUILDKIT=0 docker compose -f docker-compose.timeweb.yml up -d --build
            docker image prune -f
