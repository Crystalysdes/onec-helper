name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'installer/inno/**'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:

permissions:
  contents: write  # needed to create/update Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup (via Chocolatey)
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Stage agent source into installer build dir
        shell: pwsh
        run: |
          $dst = 'installer/inno/agent'
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item -Force 'agent/*.py' $dst
          Copy-Item -Force 'agent/requirements.txt' $dst
          if (Test-Path 'agent/README.md') { Copy-Item -Force 'agent/README.md' $dst }
          Get-ChildItem $dst

      - name: Download embeddable Python 3.11.9
        shell: pwsh
        run: |
          $url = 'https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip'
          Invoke-WebRequest -Uri $url -OutFile 'installer/inno/python-3.11.9-embed-amd64.zip'
          Write-Host "Python zip size: $((Get-Item 'installer/inno/python-3.11.9-embed-amd64.zip').Length) bytes"

      - name: Download get-pip.py
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://bootstrap.pypa.io/get-pip.py' -OutFile 'installer/inno/get-pip.py'

      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          cd installer\inno
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" 1c-helper.iss
          if errorlevel 1 exit /b 1

      - name: List built artifacts
        shell: pwsh
        run: Get-ChildItem dist/ -Recurse

      - name: Publish as rolling "agent-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-latest
          name: 1C Helper agent installer (latest main)
          body: |
            Auto-built from latest main branch.
            Direct download: [net1c-agent-setup.exe](https://github.com/${{ github.repository }}/releases/download/agent-latest/net1c-agent-setup.exe)
            Commit: ${{ github.sha }}
          files: dist/net1c-agent-setup.exe
          prerelease: false
          make_latest: true
