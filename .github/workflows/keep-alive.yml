name: Keep Timeweb Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Timeweb backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://net1c.ru/health)
          echo "Timeweb /health → $STATUS"
