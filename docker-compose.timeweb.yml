services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - BACKEND_DOMAIN=${BACKEND_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./miniapp/dist:/srv/miniapp:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  uploads:
  caddy_data:
  caddy_config:
